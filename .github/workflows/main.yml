name: Update SideStore Source
on:
  push:
    paths:
      - 'NightFox Repository.json' # 이 파일이 업로드될 때마다 실행
  workflow_dispatch: # 직접 버튼 눌러서 실행하는 기능 유지

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 저장소 쓰기 권한
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0 # 모든 히스토리를 가져와야 rebase가 안정적으로 작동함

      - name: Download All IPAs from Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 릴리즈가 생성될 때뿐만 아니라 수동 실행 시에도 작동하도록 조건 처리
          TAG=${{ github.event.release.tag_name || 'latest' }}
          gh release download $TAG --pattern "*.ipa" --clobber || echo "No IPA files found"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyGithub

      - name: Run Script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: python update_source.py

      - name: Commit and Push Changes
        run: |
          # 1. 사용자 설정 (가급적 공식 bot 계정 사용 권장)
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # 2. 변경된 파일 추가 (JSON 파일 및 아이콘 폴더)
          # update_source.py가 수정한 identifier 포함 JSON을 스테이징합니다.
          git add "NightFox Repository.json"
          if [ -d "icons" ]; then git add icons/*.png; fi

          # 3. 변경 사항이 있을 때만 실행 (불필요한 에러 방지)
          if ! git diff --cached --quiet; then
            # [핵심] [skip ci]를 넣어 무한 루프를 방지합니다.
            git commit -m "chore: update repository with identifier [skip ci]"
            
            # 4. 원격 주소 설정 및 강제 푸시
            # 헤드(HEAD)를 main 브랜치에 직접 꽂아 넣는 방식입니다.
            git remote set-url origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
            git push origin HEAD:main --force
          else
            echo "No changes to commit - JSON is already up to date."
          fi
