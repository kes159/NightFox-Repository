name: Update SideStore Source
on:
  release:
    types: [published]
  workflow_dispatch: # 수동 실행 버튼 추가

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 저장소 쓰기 권한
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0 # 모든 히스토리를 가져와야 rebase가 안정적으로 작동함

      - name: Download All IPAs from Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 릴리즈가 생성될 때뿐만 아니라 수동 실행 시에도 작동하도록 조건 처리
          TAG=${{ github.event.release.tag_name || 'latest' }}
          gh release download $TAG --pattern "*.ipa" --clobber || echo "No IPA files found"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyGithub

      - name: Run Script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: python update_source.py

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # 파일명에 공백이 있으므로 따옴표 처리 필수
          git add "NightFox_Repository.json" || git add "NightFox Repository.json"
          
          if [ -d "icons" ]; then
            git add icons/*.png
          fi
          
          # 변경 사항이 있을 때만 실행
          if ! git diff --cached --quiet; then
            git commit -m "chore: update repository source and icons [skip ci]"
            
            # 인증 정보 재설정
            git remote set-url origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
            
            # [핵심 수정] 푸시 전 원격의 변경사항을 가져와 내 커밋을 그 위에 재배치(충돌 방지)
            git pull --rebase origin main
            
            git push origin HEAD:main
          else
            echo "No changes to commit"
          fi
