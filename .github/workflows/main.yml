name: Update SideStore Source
on:
  release:
    types: [published]
  workflow_dispatch: # 수동 실행 버튼 추가 (테스트용)

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 명시적으로 쓰기 권한 부여
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }} # 체크아웃 단계부터 토큰 주입
          fetch-depth: 0

      - name: Download All IPAs from Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download ${{ github.event.release.tag_name }} --pattern "*.ipa"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Script
        env:
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: python update_source.py

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add "NightFox Repository.json"
          if [ -d "icons" ]; then
            git add icons/*.png
          fi
          
          # 변경 사항이 있을 때만 실행
          if ! git diff --cached --quiet; then
            git commit -m "chore: update repository source and icons [skip ci]"
            # 원격 저장소 주소를 토큰을 포함한 형태로 강제 재설정
            git remote set-url origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
            git push origin HEAD:main
          else
            echo "No changes to commit"
          fi
