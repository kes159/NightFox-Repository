name: Update SideStore Source
on:
  push:
    paths:
      - 'NightFox Repository.json' # 이 파일이 업로드될 때마다 실행
  workflow_dispatch: # 직접 버튼 눌러서 실행하는 기능 유지

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 저장소 쓰기 권한
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0 # 모든 히스토리를 가져와야 rebase가 안정적으로 작동함

      - name: Download All IPAs from Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 릴리즈가 생성될 때뿐만 아니라 수동 실행 시에도 작동하도록 조건 처리
          TAG=${{ github.event.release.tag_name || 'latest' }}
          gh release download $TAG --pattern "*.ipa" --clobber || echo "No IPA files found"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyGithub

      - name: Run Script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: python update_source.py

      - name: Commit and Push
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add .
        # [skip ci]를 넣으면 액션이 본인이 커밋한 거에는 다시 반응하지 않습니다.
        git commit -m "Update SideStore Source [skip ci]" || echo "No changes to commit"
        git push
        
          # 1. 사용자 설정
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # 2. 파일 추가 (공백 대응)
          git add "NightFox*.json"
          if [ -d "icons" ]; then git add icons/*.png; fi
          
          # 3. 변경 사항이 있을 때만 실행
          if ! git diff --cached --quiet; then
            # 임시 커밋 생성
            git commit -m "chore: update repository source and icons [skip ci]"
            
            # 4. 원격 주소 설정 (토큰 포함)
            git remote set-url origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
            
            # 5. [핵심] 현재 내 위치(HEAD)를 원격의 main 브랜치로 강제로 꽂아넣기
            # 이 명령은 앞뒤 순서 안 따지고 현재 상태로 main을 덮어씌웁니다.
            git push origin HEAD:main --force
          else
            echo "No changes to commit"
          fi
