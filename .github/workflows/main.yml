name: Update SideStore Source
on:
  release:
    types: [published]

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download All IPAs from Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 현재 릴리스에 포함된 모든 .ipa 파일을 다운로드
          gh release download ${{ github.event.release.tag_name }} --pattern "*.ipa"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Script
        env:
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: python update_source.py

      - name: Commit and Push
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          
          # 변경사항 확인 및 커밋
          git add "NightFox Repository.json"
          if [ -d "icons" ]; then
            git add icons/*.png
          fi
          
          # 변경사항이 있을 때만 커밋 및 푸시
          if ! git diff --cached --quiet; then
            git commit -m "Update source and icons for ${{ github.event.release.tag_name }}"
            # 인증 정보가 포함된 주소로 푸시
            git push "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:main
          else
            echo "No changes to commit"
          fi
