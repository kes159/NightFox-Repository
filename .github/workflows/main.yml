name: Update SideStore Source
on:
  release:
    types: [published]
  workflow_dispatch: # 수동 실행 버튼 추가

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 저장소 쓰기 권한
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0 # 모든 히스토리를 가져와야 rebase가 안정적으로 작동함

      - name: Download All IPAs from Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 릴리즈가 생성될 때뿐만 아니라 수동 실행 시에도 작동하도록 조건 처리
          TAG=${{ github.event.release.tag_name || 'latest' }}
          gh release download $TAG --pattern "*.ipa" --clobber || echo "No IPA files found"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyGithub

      - name: Run Script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: python update_source.py

      - name: Commit and Push
        run: |
          # 1. 사용자 설정
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # 2. 브랜치 명시적 전환 (가장 중요)
          # 'detached HEAD' 상태를 탈출하여 명확히 main 브랜치로 붙입니다.
          git checkout main || git checkout -b main
          
          # 3. 변경사항 스테이징 (공백 포함 파일명 대응)
          git add "NightFox*.json"
          if [ -d "icons" ]; then git add icons/*.png; fi
          
          # 4. 변경사항이 있을 때만 실행
          if ! git diff --cached --quiet; then
            git commit -m "chore: update repository source and icons [skip ci]"
            
            # 5. 원격 주소 설정 (토큰 포함)
            git remote set-url origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
            
            # 6. 원격의 최신 내용을 가져와서 내 커밋을 그 뒤에 강제로 붙임
            git pull --rebase origin main
            
            # 7. 강제 푸시 (Rejected 에러를 무시하고 덮어씌움)
            git push origin main --force
          else
            echo "No changes to commit"
          fi
          
